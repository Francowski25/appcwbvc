<header class="flex items-center justify-between gap-3 px-3 sm:px-6 py-3 bg-white border-b border-gray-200 flex-shrink-0">

  <div class="flex items-center gap-3 flex-1 min-w-0">
    <!-- Mobile/tablet menu toggle, hidden on lg where the sidebar is docked -->
    <button (click)="layout.toggle()"
      class="lg:hidden w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-bars text-lg"></i>
    </button>

    <div class="hidden sm:flex items-center gap-2 bg-gray-100 rounded-lg px-3 py-2 w-full max-w-xs md:max-w-sm lg:w-72">
      <i class="pi pi-search text-gray-400 text-sm flex-shrink-0"></i>
      <input type="text" [(ngModel)]="search" placeholder="Buscar productos, clientes..."
        class="bg-transparent text-sm text-gray-700 outline-none w-full placeholder-gray-400" />
    </div>
  </div>

  <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">

    <button
      class="relative w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-envelope text-lg"></i>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-blue-500 rounded-full"></span>
    </button>

    <button
      class="relative w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-bell text-lg"></i>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <button
      class="hidden sm:flex w-9 h-9 items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-cog text-lg"></i>
    </button>

  </div>

</header>
