<header
  class="w-full flex items-center justify-between gap-1 sm:gap-3 px-3 sm:px-6 py-2.5 bg-white border-b border-gray-200 flex-shrink-0 min-w-0">

  <div class="flex items-center flex-shrink-0">
    <button (click)="layout.toggle()"
      class="lg:hidden w-9 h-9 flex items-center justify-center rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
      <i class="pi pi-bars text-lg"></i>
    </button>
  </div>

  <div class="flex items-center gap-0.5 sm:gap-2 flex-shrink-0 ml-auto">

    <button type="button" aria-label="Mensajes"
      class="w-9 h-9 flex-shrink-0 relative flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-envelope text-lg"></i>
      <span class="absolute top-2 right-2 w-2 h-2 bg-blue-500 rounded-full"></span>
    </button>

    <button type="button" aria-label="Notificaciones"
      class="w-9 h-9 flex-shrink-0 relative flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-bell text-lg"></i>
      <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <button type="button" aria-label="Configuración"
      class="w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
      <i class="pi pi-cog text-lg"></i>
    </button>

  </div>

</header>
