<div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6 flex flex-col justify-between">
    <div class="flex items-center justify-between pb-3 border-b border-slate-100 mb-2">
        <div>
            <h3 class="text-base font-extrabold text-slate-800 m-0">Ventas de la semana</h3>
            <p class="text-xs text-slate-400 m-0 mt-0.5">Ingresos diarios acumulados</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl text-xs font-bold text-slate-600">
                <button class="bg-indigo-600 text-white px-3 py-1 rounded-lg shadow-xs">Semana</button>
            </div>
            <div class="text-right pl-2 border-l border-slate-200">
                <span class="block text-[9px] uppercase font-bold text-slate-400">Total</span>
                <span class="text-sm font-black text-indigo-600">S/ {{ totalSemana() | number:'1.2-2' }}</span>
            </div>
        </div>
    </div>

    @if (hasSales()) {
    <div class="h-[230px] w-full mt-2">
        <p-chart type="line" [data]="chartData()" [options]="chartOptions()" height="230px" />
    </div>
    } @else {
    <div
        class="h-[230px] bg-slate-50/50 rounded-xl border border-dashed border-slate-200 flex items-center justify-center">
        <div class="flex flex-col items-center gap-2 text-slate-400">
            <i class="pi pi-chart-line text-3xl"></i>
            <p class="text-xs font-medium m-0">Sin registros de ventas esta semana</p>
        </div>
    </div>
    }
</div>
