<div class="p-4 sm:p-6 lg:p-8 flex flex-col gap-5 max-w-[1700px] mx-auto  min-h-screen text-slate-800 font-sans">

    @if (loading()) {
    <div class="flex items-center justify-center py-20">
        <div class="flex flex-col items-center gap-2 text-slate-400">
            <i class="pi pi-spin pi-spinner text-3xl"></i>
            <span class="text-xs font-semibold">Cargando datos del dashboard...</span>
        </div>
    </div>
    } @else {

    <app-dashboard-kpi [kpi]="kpi()" [pctVentas]="pctVentas()" [valorAlmacen]="valorAlmacen()"
        [productosOk]="productosOk()" [stockCriticoLocal]="stockCriticoLocal()" [agotadosLocal]="agotadosLocal()">
    </app-dashboard-kpi>

    <app-dashboard-middle-panels [topProductos]="topProductosConPct()" [alertasStock]="alertasStock()"
        [alertasVencimiento]="alertasVencimiento()" [totalAlertas]="totalAlertas()" [recentSales]="recentSales()"
        [getHoraFn]="getHora">
    </app-dashboard-middle-panels>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">

        <div class="lg:col-span-7">
            <app-dashboard-graphics [chartData]="lineChartData()" [chartOptions]="lineChartOptions"
                [totalSemana]="totalSemana()" [hasSales]="salesWeek().length > 0">
            </app-dashboard-graphics>
        </div>

        <div class="lg:col-span-5">
            <app-dashboard-bottom-panels [recentPurchases]="recentPurchases()" [usuarios]="top5Usuarios()"
                [getFechaFn]="getFechaCorta">
            </app-dashboard-bottom-panels>
        </div>

    </div>

    }

</div>
