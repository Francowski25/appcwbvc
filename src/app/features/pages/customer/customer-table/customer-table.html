<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col gap-4">

    <h2 class="text-xl font-extrabold text-gray-900 tracking-tight flex items-center gap-3">
        <span class="p-2 bg-pink-50 text-pink-600 rounded-xl inline-flex items-center justify-center">
            <i class="pi pi-users text-lg"></i>
        </span>
        Lista de Clientes
    </h2>

    @if (error()) {
    <div class="p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm flex items-start gap-3">
        <i class="pi pi-exclamation-circle text-base mt-0.5"></i>
        <p>{{ error() }}</p>
    </div>
    }

    <div class="overflow-x-auto rounded-xl border border-gray-100">
        <p-table [value]="clientes()" [loading]="loading()" [rowHover]="true" [paginator]="true" [rows]="10"
            styleClass="p-datatable-sm p-datatable-striped">

            <ng-template #header>
                <tr class="bg-pink-50/70 text-left">
                    <th pSortableColumn="name"
                        class="text-xs font-bold text-pink-500 uppercase tracking-wider px-4 py-3 cursor-pointer hover:bg-pink-100/40">
                        <div class="flex items-center gap-1.5">
                            <i class="pi pi-user text-xs"></i> Cliente
                            <p-sortIcon field="name" />
                        </div>
                    </th>
                    <th class="text-xs font-bold text-pink-500 uppercase tracking-wider px-4 py-3">
                        <div class="flex items-center gap-1.5">
                            <i class="pi pi-id-card text-xs"></i> Tipo doc.
                        </div>
                    </th>
                    <th pSortableColumn="documentNumber"
                        class="text-xs font-bold text-pink-500 uppercase tracking-wider px-4 py-3 cursor-pointer hover:bg-pink-100/40">
                        <div class="flex items-center gap-1.5">
                            <i class="pi pi-hashtag text-xs"></i> N° Documento
                            <p-sortIcon field="documentNumber" />
                        </div>
                    </th>
                    <th pSortableColumn="createdAt"
                        class="text-xs font-bold text-pink-500 uppercase tracking-wider px-4 py-3 cursor-pointer hover:bg-pink-100/40">
                        <div class="flex items-center gap-1.5">
                            <i class="pi pi-calendar text-xs"></i> Registrado
                            <p-sortIcon field="createdAt" />
                        </div>
                    </th>
                </tr>
            </ng-template>

            <ng-template #body let-c>
                <tr class="hover:bg-pink-50/30 transition-colors">

                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center shrink-0">
                                <span class="text-xs font-bold text-pink-600">
                                    {{ c.name?.charAt(0)?.toUpperCase() ?? '?' }}
                                </span>
                            </div>
                            <p class="text-sm font-semibold text-gray-800 m-0">{{ c.name }}</p>
                        </div>
                    </td>

                    <td class="px-4 py-3">
                        <span
                            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-blue-50 text-blue-600 border border-blue-200">
                            <i class="pi pi-id-card text-xs"></i>
                            {{ c.documentType }}
                        </span>
                    </td>

                    <td class="px-4 py-3">
                        <span class="text-xs font-mono font-bold text-gray-600 bg-gray-100 px-2.5 py-1 rounded-lg">
                            {{ c.documentNumber }}
                        </span>
                    </td>

                    <td class="px-4 py-3">
                        <span class="text-xs text-gray-500">{{ c.createdAt }}</span>
                    </td>

                </tr>
            </ng-template>

            <ng-template #emptymessage>
                <tr>
                    <td colspan="4">
                        <div class="flex flex-col items-center justify-center py-12">
                            <i class="pi pi-users text-4xl mb-2 text-pink-200"></i>
                            <p class="text-xs font-medium text-gray-400">No se encontraron clientes.</p>
                        </div>
                    </td>
                </tr>
            </ng-template>

        </p-table>
    </div>
</div>
