<div class="p-3 sm:p-4 lg:p-6 flex flex-col gap-4 sm:gap-6 w-full max-w-full overflow-x-hidden">

    <app-category-sidebar [busquedaValue]="busqueda()" [estadoValue]="estadoFiltro()"
        [totalCategorias]="totalCategorias()" [totalActivas]="totalActivas()" [totalInactivas]="totalInactivas()"
        (busquedaChange)="onBusquedaChange($event)" (estadoChange)="onEstadoChange($event)"
        (crearCategoria)="onCrearCategoria()" />

    <div class="grid grid-cols-1 lg:grid-cols-10 gap-4 sm:gap-6 items-stretch w-full">

        <div class="lg:col-span-6 min-w-0 w-full flex flex-col">
            <app-category-table class="w-full flex-1 flex flex-col" [categorias]="filtrados()"
                [total]="totalCategorias()" [loading]="loading()" [error]="error()"
                (crearCategoria)="onCrearCategoria()" (onEdit)="onEditar($event)"
                (onToggleStatus)="onToggleStatus($event)" />
        </div>

        <div class="lg:col-span-4 min-w-0 w-full flex flex-col">
            <app-category-graphic class="w-full flex-1 flex flex-col min-h-[350px] lg:min-h-0"
                [categorias]="categorias()" [productos]="productos()">
            </app-category-graphic>
        </div>

    </div>

    <p-confirmDialog />

    <p-dialog [visible]="showInsertDialog()" (visibleChange)="showInsertDialog.set($event)" [modal]="true"
        [draggable]="false" [resizable]="false" [style]="{ width: '48rem' }" [breakpoints]="{ '768px': '95vw' }"
        [dismissableMask]="false" styleClass="!rounded-2xl !p-0 overflow-hidden"
        (onHide)="categoryInsertComp()?.resetForm()">

        <ng-template #header>
            <div class="flex items-center gap-4 py-1">
                <div
                    class="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 border border-pink-200 shrink-0">
                    <i class="pi pi-plus-circle text-xl"></i>
                </div>
                <div class="text-left">
                    <h2 class="font-bold text-base md:text-lg text-slate-700 leading-tight">Registrar Nueva Categoría
                    </h2>
                    <p class="text-xs text-slate-400 mt-0.5 leading-normal font-normal">
                        Complete el nombre y datos iniciales de la categoría de productos.
                    </p>
                </div>
            </div>
        </ng-template>

        <ng-template #icons>
            <button class="p-dialog-header-icon p-link" (click)="showInsertDialog.set(false)">
                <i class="pi pi-times"></i>
            </button>
        </ng-template>

        <app-category-insert (cerrarDialog)="showInsertDialog.set(false)"
            (categoriaRegistrada)="onCategoriaRegistrada()" />

    </p-dialog>

    <p-dialog [visible]="showDetailDialog()" (visibleChange)="showDetailDialog.set($event)" [modal]="true"
        [draggable]="false" [resizable]="false" [style]="{ width: '48rem' }" [breakpoints]="{ '768px': '95vw' }"
        [dismissableMask]="false" styleClass="!rounded-2xl !p-0 overflow-hidden">

        <ng-template #header>
            <div class="flex items-center gap-4 py-1">
                <div
                    class="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 border border-pink-200 shrink-0">
                    <i class="pi pi-info-circle text-xl"></i>
                </div>
                <div class="text-left">
                    <h2 class="font-bold text-base md:text-lg text-slate-700 leading-tight">Información de la Categoría
                    </h2>
                    <p class="text-xs text-slate-400 mt-0.5 leading-normal font-normal">
                        Detalles de métricas, productos vinculados y auditoría de creación.
                    </p>
                </div>
            </div>
        </ng-template>

        <ng-template #icons>
            <button class="p-dialog-header-icon p-link" (click)="showDetailDialog.set(false)">
                <i class="pi pi-times"></i>
            </button>
        </ng-template>

        <app-category-detail [categoria]="selectedCategory()" (onClose)="onCategoriaDetallada()"
            (onEditar)="onCategoriaDetallada()" />

    </p-dialog>

</div>
