<div
    class="w-full min-h-[350px] sm:h-full bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-gray-100 flex flex-col justify-between">

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
        <div>
            <p class="text-sm font-bold text-slate-700">Productos por Categoría</p>
            <p class="text-xs text-slate-400 mt-0.5">Distribución de productos registrados</p>
        </div>

        <div
            class="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-2 sm:pt-0 border-gray-50">
            <div class="flex flex-col items-start sm:items-end">
                <p class="text-xl sm:text-2xl font-black text-slate-700 leading-none">{{ categorias().length }}</p>
                <p class="text-[10px] text-slate-400 mt-0.5">categorías</p>
            </div>

            <div class="w-9 h-9 rounded-xl bg-pink-50 border border-pink-100 flex items-center justify-center shrink-0">
                <i class="pi pi-chart-bar text-pink-400 text-sm"></i>
            </div>
        </div>
    </div>

    <div class="relative w-full flex-1 min-h-[220px] sm:min-h-0">
        <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" class="w-full h-full block" />
    </div>

</div>
