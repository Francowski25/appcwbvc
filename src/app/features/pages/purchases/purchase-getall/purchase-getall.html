<div class="p-3 sm:p-4 lg:p-6 flex flex-col gap-6">

    <app-purchase-kpi [totalCompras]="totalCompras()" [montoTotal]="montoTotal()"
        [proveedoresDistintos]="proveedoresDistintos()" [promedioPorCompra]="promedioPorCompra()" />

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

        <div class="lg:col-span-3">
            <app-purchase-table [compras]="filtrados()" [loading]="loading()" [error]="error()"
                (verDetalle)="onVerDetalle($event)" (nuevaCompra)="onNuevaCompra()" />
        </div>
        <app-purchase-sidebar [busqueda]="busqueda()" [proveedorSeleccionado]="proveedorSeleccionado()"
            [proveedores]="proveedores()" (busquedaChange)="onBusqueda($event)"
            (proveedorChange)="onProveedorChange($event)" (limpiarFiltros)="onLimpiarFiltros()" />


    </div>

    <app-purchase-detail [compra]="compraSeleccionada()" [visible]="showDetalle()"
        (visibleChange)="showDetalle.set($event)" />

    <app-purchase-new [visible]="showNuevaCompra()" (visibleChange)="showNuevaCompra.set($event)"
        (compraCreada)="onCompraCreada()" />

</div>
